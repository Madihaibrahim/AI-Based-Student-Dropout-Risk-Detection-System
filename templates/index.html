<!DOCTYPE html>
<html>

<head>
    <title>Student Dropout System</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        input,
        button {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            grid-column: 1/3;
            background: #667eea;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #5563d6;
        }

        .result {
            text-align: center;
            font-size: 20px;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Student Dropout Prediction</h2>

        <form action="/predict" method="post">
            <div class="grid">

                <input name="Student_ID" placeholder="Student ID" required>
                <input name="Age" placeholder="Age" required>
                <input name="Gender" placeholder="Gender (0/1)" required>
                <input name="Family_Income" placeholder="Family Income" required>
                <input name="Internet_Access" placeholder="Internet Access (0/1)" required>
                <input name="Study_Hours_per_Day" placeholder="Study Hours" required>
                <input name="Attendance_Rate" placeholder="Attendance Rate" required>
                <input name="Assignment_Delay_Days" placeholder="Assignment Delay" required>
                <input name="Travel_Time_Minutes" placeholder="Travel Time" required>
                <input name="Part_Time_Job" placeholder="Part Time Job (0/1)" required>
                <input name="Scholarship" placeholder="Scholarship (0/1)" required>
                <input name="Stress_Index" placeholder="Stress Index" required>
                <input name="GPA" placeholder="GPA" required>
                <input name="Semester_GPA" placeholder="Semester GPA" required>
                <input name="CGPA" placeholder="CGPA" required>
                <input name="Semester" placeholder="Semester" required>
                <input name="Department" placeholder="Department" required>
                <input name="Parental_Education" placeholder="Parental Education" required>

                <button type="submit">Predict</button>

            </div>
        </form>

        <div class="result">{{ prediction_text }}</div>
        <div class="result">{{ cluster_text }}</div>

    </div>
</body>

</html>
